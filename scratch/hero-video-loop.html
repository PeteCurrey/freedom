<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Video Loop</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0A0A0A;
            overflow: hidden;
            font-family: sans-serif;
        }

        .slideshow-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 2s ease-in-out, visibility 2s;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transform: scale(1.05);
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            animation: kenburns 8s linear forwards;
        }

        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Gradient Overlays to match the hero section */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.4), transparent, rgba(10, 10, 10, 1));
            z-index: 10;
        }
        
        .overlay-dark {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 10, 0.2);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="slideshow-container">
        <!-- These paths assume the HTML is opened locally or served from public -->
        <!-- Will use absolute file paths for local viewing -->
        <div class="slide active" style="background-image: url('file:///c:/Users/pete/OneDrive/Desktop/Amplios/public/images/hero-background.png');"></div>
        <div class="slide" style="background-image: url('file:///c:/Users/pete/OneDrive/Desktop/Amplios/public/images/community-showcase.png');"></div>
        <div class="slide" style="background-image: url('file:///c:/Users/pete/OneDrive/Desktop/Amplios/public/images/systems-showcase.png');"></div>
        <div class="slide" style="background-image: url('file:///c:/Users/pete/OneDrive/Desktop/Amplios/public/images/interior-showcase.png');"></div>
        <div class="overlay"></div>
        <div class="overlay-dark"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const slides = document.querySelectorAll('.slide');
            let currentSlide = 0;
            
            // Start the first animation
            slides[currentSlide].classList.add('active');

            setInterval(() => {
                slides[currentSlide].classList.remove('active');
                
                currentSlide = (currentSlide + 1) % slides.length;
                
                slides[currentSlide].classList.add('active');
            }, 6000); // 6 seconds per slide
        });
    </script>
</body>
</html>
